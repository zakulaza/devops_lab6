name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
        # Якщо у вас є requirements.txt, розкоментуйте наступний рядок:
        # pip install -r requirements.txt

    - name: Run unit tests
      run: |
        # Тут ми запускаємо ваші тести. 
        # Якщо папки tests ще немає, команда просто пропустить цей крок.
        pytest